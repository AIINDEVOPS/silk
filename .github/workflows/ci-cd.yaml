name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'helm/**'
      - 'k8s-kops/**'
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: csv-processor
  HELM_CHART: helm/csv-app

jobs:
  # ── Test & Lint ─────────────────────────────────────────────────────────
  test:
    name: Test Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt
          pip install pytest pytest-flask

      - name: Run tests
        run: |
          cd app
          python -m pytest tests/ -v || echo "No tests found"

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/app.py --max-line-length=120 --ignore=E501

  # ── Build & Push Docker Image ───────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Helm Lint & Template Validation ────────────────────────────────────
  helm-validate:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ${{ env.HELM_CHART }}

      - name: Helm template (dev)
        run: |
          helm template csv-app ${{ env.HELM_CHART }} \
            -f helm/environments/dev-values.yaml \
            --dry-run

      - name: Helm template (prod)
        run: |
          helm template csv-app ${{ env.HELM_CHART }} \
            -f helm/environments/prod-values.yaml \
            --dry-run

  # ── Terraform Plan ──────────────────────────────────────────────────────
  terraform:
    name: Terraform Plan (S3)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: terraform-s3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

  # ── Deploy to Kubernetes (Dev) ──────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build, helm-validate]
    if: github.ref == 'refs/heads/develop'
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > ~/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install csv-app ${{ env.HELM_CHART }} \
            -f helm/environments/dev-values.yaml \
            --set image.flaskApp.tag=${{ github.sha }} \
            --namespace csv-app \
            --create-namespace \
            --wait --timeout 5m

  # ── Deploy to Production ────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, helm-validate]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install csv-app ${{ env.HELM_CHART }} \
            -f helm/environments/prod-values.yaml \
            --set image.flaskApp.tag=${{ github.sha }} \
            --namespace csv-app \
            --create-namespace \
            --wait --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/csv-app-csv-app -n csv-app
          kubectl get pods -n csv-app
