# MinIO — local S3-compatible object storage for Minikube testing
# Replaces AWS S3 for end-to-end local validation
# MinIO bucket "csv-uploads" acts exactly like an S3 bucket
# Access MinIO Console at: minikube service minio-console -n csv-app
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: csv-app
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard   # Minikube default storage class

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: csv-app
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-pvc

---
# Internal API service (used by the Flask app)
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: csv-app
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
  type: ClusterIP

---
# NodePort so you can open the MinIO console in your browser
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: csv-app
spec:
  selector:
    app: minio
  ports:
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
  type: NodePort
