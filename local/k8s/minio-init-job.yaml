# One-shot Job that creates the "csv-uploads" bucket in MinIO on first deploy
# Uses mc (MinIO Client) to wait for MinIO to be ready then creates the bucket
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: csv-app
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until mc alias set local http://minio:9000 minioadmin minioadmin; do
                echo "MinIO not ready, retrying in 5s..."
                sleep 5
              done
              echo "Creating bucket csv-uploads..."
              mc mb --ignore-existing local/csv-uploads
              mc anonymous set download local/csv-uploads
              echo "MinIO setup complete"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
