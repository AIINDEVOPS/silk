name: CI/CD Pipeline - Azure

on:
  push:
    branches: [main, develop]
    paths:
      - 'azure/app/**'
      - 'azure/helm/**'
      - 'azure/k8s/**'
      - 'azure/terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'azure/**'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: csv-processor-azure
  HELM_CHART: helm/csv-app
  AZURE_RESOURCE_GROUP: devops-case-study-rg
  AKS_CLUSTER_NAME: devops-aks-cluster
  TF_WORKING_DIR: azure/terraform

jobs:
  # ── Test ────────────────────────────────────────────────────────────────
  test:
    name: Test Azure Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd azure/app
          pip install -r requirements.txt
          pip install pytest pytest-flask

      - name: Run tests
        run: |
          cd azure/app
          python -m pytest tests/ -v || echo "No tests found - skipping"

      - name: Lint
        run: |
          pip install flake8
          flake8 azure/app/app.py --max-line-length=120

  # ── Build & Push Docker Image ───────────────────────────────────────────
  build:
    name: Build & Push Docker Image (Azure)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Azure image
        uses: docker/build-push-action@v5
        with:
          context: ./azure/app
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Helm Validate ───────────────────────────────────────────────────────
  helm-validate:
    name: Validate Helm Chart (Azure values)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ${{ env.HELM_CHART }}

      - name: Helm template - Azure dev
        run: |
          helm template csv-app ${{ env.HELM_CHART }} \
            -f azure/helm/environments/azure-dev-values.yaml --dry-run

      - name: Helm template - Azure prod
        run: |
          helm template csv-app ${{ env.HELM_CHART }} \
            -f azure/helm/environments/azure-prod-values.yaml --dry-run

  # ── Terraform Plan (Azure Storage) ─────────────────────────────────────
  terraform-plan:
    name: Terraform Plan - Azure
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-azure
          path: ${{ env.TF_WORKING_DIR }}/tfplan

  # ── Terraform Apply (prod only) ─────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply - Azure
    runs-on: ubuntu-latest
    needs: [terraform-plan, build]
    if: github.ref == 'refs/heads/main'
    environment: azure-production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-azure
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

  # ── Deploy to AKS ───────────────────────────────────────────────────────
  deploy-aks:
    name: Deploy to AKS (Production)
    runs-on: ubuntu-latest
    needs: [build, helm-validate, terraform-apply]
    if: github.ref == 'refs/heads/main'
    environment: azure-production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install csv-app ${{ env.HELM_CHART }} \
            -f azure/helm/environments/azure-prod-values.yaml \
            --set image.flaskApp.tag=${{ github.sha }} \
            --set image.flaskApp.repository=${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }} \
            --namespace csv-app \
            --create-namespace \
            --wait --timeout 10m

      - name: Verify AKS deployment
        run: |
          kubectl rollout status deployment/csv-app-csv-app -n csv-app
          kubectl get pods -n csv-app -o wide
          kubectl get hpa -n csv-app

  # ── Deploy to AKS Dev ───────────────────────────────────────────────────
  deploy-aks-dev:
    name: Deploy to AKS (Dev)
    runs-on: ubuntu-latest
    needs: [build, helm-validate]
    if: github.ref == 'refs/heads/develop'
    environment: azure-development
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials (dev)
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}-dev \
            --name ${{ env.AKS_CLUSTER_NAME }}-dev \
            --overwrite-existing

      - uses: azure/setup-helm@v4

      - name: Deploy with Helm (dev)
        run: |
          helm upgrade --install csv-app ${{ env.HELM_CHART }} \
            -f azure/helm/environments/azure-dev-values.yaml \
            --set image.flaskApp.tag=${{ github.sha }} \
            --namespace csv-app --create-namespace \
            --wait --timeout 5m
