---
# Azure-specific application configuration
app_name: csv-processor
app_version: "1.0.0"
app_env: production
platform: azure

# Flask application settings
flask_app_port: 5000
flask_workers: 2
flask_timeout: 60

# Nginx settings
nginx_port: 80
nginx_client_max_body_size: "50M"
nginx_gzip: true

# Azure Blob Storage settings (replaces AWS S3)
azure_storage_account: devopscsvuploads
azure_container_name: csv-uploads
azure_resource_group: devops-case-study-rg
azure_region: eastus

# Docker settings
docker_registry: docker.io
docker_image: aiindevops/csv-processor-azure
docker_tag: latest

# Kubernetes namespace
k8s_namespace: csv-app
k8s_kubeconfig: /home/azureuser/.kube/config

# Logging
log_level: INFO
