# Azure AKS node inventory
# For dynamic inventory use: ansible-inventory --list -i azure_rm.yaml
# Install: pip install ansible[azure]

[aks_system_nodes]
system-1 ansible_host=10.240.0.10
system-2 ansible_host=10.240.0.11
system-3 ansible_host=10.240.0.12

[aks_ondemand_nodes]
ondemand-1 ansible_host=10.241.0.10
ondemand-2 ansible_host=10.241.0.11

[aks_spot_nodes]
# Spot nodes are dynamic — use dynamic inventory plugin

[aks_cluster:children]
aks_system_nodes
aks_ondemand_nodes

[all:vars]
ansible_user=azureuser
ansible_ssh_private_key_file=~/.ssh/aks-key
ansible_python_interpreter=/usr/bin/python3
