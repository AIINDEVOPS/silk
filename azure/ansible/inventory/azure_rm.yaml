---
# Azure Resource Manager dynamic inventory plugin
# Usage: ansible-inventory -i azure_rm.yaml --list
# Requires: pip install ansible[azure]
plugin: azure.azcollection.azure_rm

include_vm_resource_groups:
  - devops-case-study-rg

auth_source: auto   # Uses az CLI login / managed identity / env vars

# Group VMs by their node pool tag
keyed_groups:
  - key: tags.nodepool
    prefix: nodepool
  - key: tags.node_type
    prefix: nodetype

# Only include AKS nodes
exclude_filters:
  - provisioning_state == "Failed"

hostvar_expressions:
  ansible_host: private_ipv4_addresses[0]
