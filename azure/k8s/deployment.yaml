---
apiVersion: v1
kind: Namespace
metadata:
  name: csv-app
  labels:
    azure.workload.identity/use: "true"

---
# Service Account with Workload Identity annotation (Azure IRSA equivalent)
# Links K8s SA to Azure Managed Identity via OIDC federation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: csv-app-sa
  namespace: csv-app
  annotations:
    azure.workload.identity/client-id: "AZURE_CLIENT_ID_FROM_TERRAFORM_OUTPUT"
  labels:
    azure.workload.identity/use: "true"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: csv-app
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      gzip on;
      gzip_types text/plain text/css application/javascript;
      client_max_body_size 50M;
      upstream flask_app { server localhost:5000; }
      server {
        listen 80;
        server_name _;
        location /static/ {
          alias /app/shared-static/;
          expires 30d;
        }
        location / {
          proxy_pass http://flask_app;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_connect_timeout 30s;
          proxy_read_timeout 60s;
        }
        location /health { proxy_pass http://flask_app/health; access_log off; }
      }
    }

---
apiVersion: v1
kind: Secret
metadata:
  name: csv-app-secrets
  namespace: csv-app
type: Opaque
stringData:
  AZURE_STORAGE_ACCOUNT: "devopscsvuploads"
  AZURE_CONTAINER_NAME: "csv-uploads"
  SECRET_KEY: "change-me-in-production"
  APP_ENV: "production"

---
# Deployment: Nginx sidecar + Flask app in same pod
# Shares static files via emptyDir (not NFS)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: csv-app
  namespace: csv-app
  labels:
    app: csv-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: csv-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: csv-app
        azure.workload.identity/use: "true"   # Enable Workload Identity on pod
    spec:
      serviceAccountName: csv-app-sa          # Binds to Azure Managed Identity

      # Prefer on-demand nodes; tolerate spot if needed
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values: [ondemand]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [csv-app]
                topologyKey: kubernetes.io/hostname

      tolerations:
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: Equal
          value: "spot"
          effect: PreferNoSchedule

      # Init container: copy static files → emptyDir volume (not NFS)
      initContainers:
        - name: static-files-init
          image: aiindevops/csv-processor-azure:latest
          command: ["sh", "-c", "cp -r /app/static/. /shared-static/ && echo Done"]
          volumeMounts:
            - name: shared-static
              mountPath: /shared-static

      containers:
        # ── Flask App ──────────────────────────────────────
        - name: flask-app
          image: aiindevops/csv-processor-azure:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: AZURE_STORAGE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: csv-app-secrets
                  key: AZURE_STORAGE_ACCOUNT
            - name: AZURE_CONTAINER_NAME
              valueFrom:
                secretKeyRef:
                  name: csv-app-secrets
                  key: AZURE_CONTAINER_NAME
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: csv-app-secrets
                  key: SECRET_KEY
            - name: APP_ENV
              valueFrom:
                secretKeyRef:
                  name: csv-app-secrets
                  key: APP_ENV
            # Workload Identity injects AZURE_CLIENT_ID, AZURE_TENANT_ID,
            # AZURE_FEDERATED_TOKEN_FILE automatically via the SA annotation
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: uploads-storage
              mountPath: /app/uploads
            - name: processed-storage
              mountPath: /app/processed

        # ── Nginx Sidecar ──────────────────────────────────
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: shared-static
              mountPath: /app/shared-static
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: shared-static      # emptyDir: fast in-node shared storage, NOT NFS
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: uploads-storage
          emptyDir: {}
        - name: processed-storage
          emptyDir: {}
