---
# Service: Azure Load Balancer (equiv to AWS NLB)
apiVersion: v1
kind: Service
metadata:
  name: csv-app-service
  namespace: csv-app
  labels:
    app: csv-app
  annotations:
    # Azure Load Balancer annotations
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/health"
    service.beta.kubernetes.io/azure-load-balancer-tcp-idle-timeout: "30"
    # Use internal LB (remove for public)
    # service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  selector:
    app: csv-app
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

---
# ClusterIP for internal access
apiVersion: v1
kind: Service
metadata:
  name: csv-app-internal
  namespace: csv-app
spec:
  selector:
    app: csv-app
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80

---
# HPA: Scale on CPU + Memory
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: csv-app-hpa
  namespace: csv-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: csv-app
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: csv-app-pdb
  namespace: csv-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: csv-app
