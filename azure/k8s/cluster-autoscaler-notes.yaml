# ─────────────────────────────────────────────────────────────────────────────
# AKS Cluster Autoscaler — Notes & Configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# KEY DIFFERENCE from AWS kops:
# AKS has BUILT-IN Cluster Autoscaler — no separate deployment needed.
# Autoscaling is configured directly on each node pool in Terraform:
#
#   enable_auto_scaling = true
#   min_count           = <min>
#   max_count           = <max>
#
# AKS CA is enabled via the Terraform node pool resource — see:
#   azure/terraform/main.tf → azurerm_kubernetes_cluster_node_pool
#
# ─────────────────────────────────────────────────────────────────────────────
# To tune CA behaviour, patch the cluster-autoscaler ConfigMap:
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-autoscaler-status
  namespace: kube-system
  # This is informational — AKS manages the actual CA deployment internally
  annotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
data:
  # AKS CA tuning is done via az CLI or Terraform:
  #
  # az aks update \
  #   --resource-group devops-case-study-rg \
  #   --name devops-aks-cluster \
  #   --cluster-autoscaler-profile \
  #     scale-down-delay-after-add=10m \
  #     scale-down-unneeded-time=10m \
  #     expander=least-waste \
  #     max-node-provision-time=15m \
  #     skip-nodes-with-local-storage=false \
  #     balance-similar-node-groups=false
  #
  # Or in Terraform:
  #   auto_scaler_profile {
  #     scale_down_delay_after_add   = "10m"
  #     scale_down_unneeded          = "10m"
  #     expander                     = "least-waste"
  #     max_node_provision_time      = "15m"
  #     skip_nodes_with_local_storage = false
  #   }
  info: |
    AKS built-in Cluster Autoscaler:
    - system nodepool:   min=3  max=5   (on-demand, system pods only)
    - ondemand nodepool: min=2  max=10  (on-demand, user workloads)
    - spot nodepool:     min=0  max=20  (spot, PreferNoSchedule taint)
    - gpuspot nodepool:  min=0  max=5   (GPU spot, NoSchedule taint)

---
# KEDA (Kubernetes Event Driven Autoscaler) - Optional advanced scaling
# Scales deployments based on Azure Service Bus, Event Hub, HTTP requests etc.
# Install: helm repo add kedacore https://kedacore.github.io/charts
#          helm install keda kedacore/keda --namespace keda --create-namespace
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: csv-app-scaledobject
  namespace: csv-app
  annotations:
    keda.sh/description: "Scale csv-app based on HTTP request rate (optional KEDA)"
spec:
  scaleTargetRef:
    name: csv-app
  minReplicaCount: 2
  maxReplicaCount: 20
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metadata:
        type: Utilization
        value: "70"
