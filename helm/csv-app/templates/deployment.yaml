apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        release: {{ .Release.Name }}
    spec:
      {{- if ne .Values.affinity.nodeType "any" }}
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values: [{{ .Values.affinity.nodeType }}]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [{{ .Release.Name }}]
                topologyKey: kubernetes.io/hostname
      {{- end }}

      initContainers:
        - name: static-files-init
          image: "{{ .Values.image.flaskApp.repository }}:{{ .Values.image.flaskApp.tag }}"
          imagePullPolicy: {{ .Values.image.flaskApp.pullPolicy }}
          command: ["sh", "-c", "cp -rv /app/static/. /shared-static/"]
          volumeMounts:
            - name: shared-static
              mountPath: /shared-static

      containers:
        - name: flask-app
          image: "{{ .Values.image.flaskApp.repository }}:{{ .Values.image.flaskApp.tag }}"
          imagePullPolicy: {{ .Values.image.flaskApp.pullPolicy }}
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
          resources:
            {{- toYaml .Values.resources.flaskApp | nindent 12 }}
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /ready, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: uploads-data
              mountPath: /app/uploads
            - name: processed-data
              mountPath: /app/processed

        - name: nginx
          image: "{{ .Values.image.nginx.repository }}:{{ .Values.image.nginx.tag }}"
          imagePullPolicy: {{ .Values.image.nginx.pullPolicy }}
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.resources.nginx | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: shared-static
              mountPath: /app/shared-static
              readOnly: true
          livenessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: shared-static    # emptyDir – shared between init + nginx, NOT NFS
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ .Release.Name }}-nginx-config
        - name: uploads-data
          emptyDir: {}
        - name: processed-data
          emptyDir: {}
