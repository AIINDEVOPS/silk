apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-config
  namespace: {{ .Values.namespace }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile      on;
      gzip          on;
      gzip_types    text/plain text/css application/javascript;
      client_max_body_size 50M;
      upstream flask_app { server 127.0.0.1:5000; }
      server {
        listen 80;
        server_name _;
        location /static/ {
          alias /app/shared-static/;
          expires 30d;
          add_header Cache-Control "public, immutable";
        }
        location /health { proxy_pass http://flask_app/health; access_log off; }
        location /ready  { proxy_pass http://flask_app/ready;  access_log off; }
        location / {
          proxy_pass http://flask_app;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_connect_timeout 30s;
          proxy_read_timeout    60s;
        }
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  STORAGE_BACKEND: {{ .Values.config.storageBackend | quote }}
  S3_BUCKET:       {{ .Values.config.s3Bucket       | quote }}
  AWS_REGION:      {{ .Values.config.awsRegion       | quote }}
  MINIO_ENDPOINT:  {{ .Values.config.minioEndpoint   | quote }}
  MINIO_ACCESS_KEY: {{ .Values.config.minioAccessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.config.minioSecretKey | quote }}
  SECRET_KEY:      {{ .Values.config.secretKey       | quote }}
