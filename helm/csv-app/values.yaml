# Default values - override per environment
replicaCount: 2

image:
  flaskApp:
    repository: YOUR_DOCKERHUB_USERNAME/csv-processor
    tag: latest
    pullPolicy: Always
  nginx:
    repository: nginx
    tag: 1.25-alpine
    pullPolicy: IfNotPresent

namespace: csv-app

service:
  type: LoadBalancer
  port: 80
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  flaskApp:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  nginx:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

config:
  s3Bucket: "devops-csv-uploads"
  awsRegion: "us-east-1"
  secretKey: "change-me-in-production"

affinity:
  nodeType: ondemand   # ondemand | spot | any

podDisruptionBudget:
  enabled: true
  minAvailable: 1

ingress:
  enabled: false
  className: nginx
  host: csv-app.example.com
  tls: false
