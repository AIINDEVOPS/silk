# Local Minikube environment values
# Usage:
#   helm upgrade --install csv-app helm/csv-app \
#     -f helm/environments/local-values.yaml \
#     --namespace csv-app --create-namespace

replicaCount: 2

image:
  flaskApp:
    repository: csv-processor   # built locally into Minikube Docker daemon
    tag: local
    pullPolicy: Never            # NEVER pull – use local Minikube image cache
  nginx:
    repository: nginx
    tag: 1.25-alpine
    pullPolicy: IfNotPresent

namespace: csv-app

service:
  type: NodePort
  port: 80
  nodePort: 30080
  annotations: {}

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5                 # reduced for local resources
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  flaskApp:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  nginx:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

config:
  storageBackend: "minio"
  s3Bucket: "csv-uploads"
  awsRegion: "us-east-1"
  minioEndpoint: "http://minio:9000"
  minioAccessKey: "minioadmin"
  minioSecretKey: "minioadmin"
  secretKey: "local-dev-secret-key"

affinity:
  nodeType: any

podDisruptionBudget:
  enabled: true
  minAvailable: 1

ingress:
  enabled: false
