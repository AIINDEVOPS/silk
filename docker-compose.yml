version: "3.9"
# Local development stack – Docker Compose
# Fastest way to develop without Minikube
# Usage: docker-compose up --build
# App:   http://localhost:8080
# MinIO: http://localhost:9001  (user: minioadmin / pass: minioadmin)

services:
  # ── MinIO: local S3-compatible object storage ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: csv-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  # ── MinIO init: create bucket on first start ──────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: csv-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/csv-uploads;
        echo 'MinIO bucket ready';
      "
    networks:
      - app-network

  # ── Flask application ─────────────────────────────────────────────────────
  flask-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: csv-flask
    environment:
      STORAGE_BACKEND: minio
      S3_BUCKET: csv-uploads
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      SECRET_KEY: local-dev-key
    volumes:
      - uploads-data:/app/uploads
      - processed-data:/app/processed
      - shared-static:/app/static    # Flask writes static here
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  # ── Init container equivalent: populate shared static volume ─────────────
  static-init:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: csv-static-init
    command: ["sh", "-c", "cp -rv /app/static/. /shared-static/ && echo 'Static files copied'"]
    volumes:
      - shared-static:/shared-static
    networks:
      - app-network

  # ── Nginx: reverse proxy + static files server ───────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: csv-nginx
    ports:
      - "8080:80"    # App → http://localhost:8080
    volumes:
      - ./app/nginx.conf:/etc/nginx/nginx.conf:ro
      - shared-static:/app/shared-static:ro   # emptyDir equivalent (named volume)
    depends_on:
      flask-app:
        condition: service_healthy
      static-init:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  minio-data:
  uploads-data:
  processed-data:
  shared-static:
