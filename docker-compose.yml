version: "3.9"

services:
  flask-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: csv-flask
    environment:
      - S3_BUCKET=${S3_BUCKET:-devops-csv-uploads}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
    volumes:
      - uploads-data:/app/uploads
      - processed-data:/app/processed
      - shared-static:/app/static:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: csv-nginx
    ports:
      - "8080:80"
    volumes:
      - ./app/nginx.conf:/etc/nginx/nginx.conf:ro
      - shared-static:/app/shared-static:ro
    depends_on:
      flask-app:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Init container equivalent in docker-compose
  static-init:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: csv-static-init
    command: ["sh", "-c", "cp -r /app/static/. /shared-static/ && echo 'Static files copied'"]
    volumes:
      - shared-static:/shared-static
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  uploads-data:
  processed-data:
  shared-static:
