---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Deploy Nginx configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
    validate: "nginx -t -c %s"
  notify: reload nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Deploy app Nginx vhost
  template:
    src: nginx-vhost.conf.j2
    dest: /etc/nginx/sites-available/csv-app.conf
    mode: "0644"
  notify: reload nginx

- name: Enable app vhost
  file:
    src: /etc/nginx/sites-available/csv-app.conf
    dest: /etc/nginx/sites-enabled/csv-app.conf
    state: link
  notify: reload nginx

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: true
