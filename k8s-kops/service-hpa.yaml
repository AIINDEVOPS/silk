---
# Service: Expose app via LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: csv-app-service
  namespace: csv-app
  labels:
    app: csv-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  selector:
    app: csv-app
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  sessionAffinity: None

---
# ClusterIP service for internal access
apiVersion: v1
kind: Service
metadata:
  name: csv-app-internal
  namespace: csv-app
spec:
  selector:
    app: csv-app
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: csv-app-hpa
  namespace: csv-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: csv-app
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120

---
# Pod Disruption Budget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: csv-app-pdb
  namespace: csv-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: csv-app
